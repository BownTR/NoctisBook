<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keşfet | Sonsuz Kitap</title>
    <link rel="stylesheet" href="landing.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grain-overlay"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Sonsuz<span>Kitap</span></a>
            <div class="nav-links" id="nav-actions">
                <a href="index.html" class="nav-item">🏠 <span>Ana Sayfa</span></a>
                <a href="discover.html" class="nav-item active">🌍 <span>Keşfet</span></a>
                
                <!-- Guest View -->
                <a href="#" class="nav-item" id="login-open">Giriş Yap / Kayıt Ol</a>
                
                <!-- Logged-in View -->
                <div id="logged-in-menu" style="display: none; align-items: center; gap: 25px;">
                    <a href="dashboard.html" class="nav-item" id="nav-library-link">📚 <span>Kütüphanem</span></a>
                    <div class="user-profile-nav">
                        <button class="profile-trigger" id="profile-trigger">👤</button>
                        <div class="nav-dropdown" id="profile-dropdown">
                            <div class="dropdown-user-info" id="user-info-name">Misafir Yazar</div>
                            <a href="profile.html" class="dropdown-link">👤 Profilim</a>
                            <a href="#" class="dropdown-link logout" id="logout-btn">🚪 Çıkış Yap</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="discover-page-container">
        <header class="discover-header">
            <h1 class="fade-up">Keşfet</h1>
            <p class="fade-up" style="animation-delay: 0.1s;">Diğer okurların kaleminden çıkan eşsiz mirasına göz atın ve yeni evrenlere yelken açın.</p>
        </header>

        <section class="discover-section fade-up">
            <div id="all-discover-grid">
                <div class="loading-spinner" style="text-align: center; color: var(--accent-gold); padding: 50px;">Eserler yükleniyor...</div>
            </div>
        </section>
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Giriş Yap</button>
                <button class="tab-btn" data-tab="register">Kayıt Ol</button>
            </div>
            
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label>E-posta</label>
                    <input type="email" placeholder="ornek@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-hero full-width">Giriş Yap</button>
            </form>

            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label>Ad Soyad</label>
                    <input type="text" placeholder="Adınız Soyadınız" required>
                </div>
                <div class="input-group">
                    <label>E-posta</label>
                    <input type="email" placeholder="ornek@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" placeholder="En az 6 karakter" required>
                </div>
                <button type="submit" class="btn-hero full-width">Hesap Oluştur</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="landing.js"></script>
    <script src="discover.js"></script>
</body>
</html>
