<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="landing.css">
    <link rel="stylesheet" href="style.css">
    <script src="translations.js"></script>
</head>

<body data-page-title="btn_start_writing">
    <div class="grain-overlay"></div>
    <div class="save-notification" id="save-notification">Kaydedildi...</div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Noctis<span>Kitap</span></a>
            <div class="nav-links" id="nav-actions">
                <div class="lang-switcher">
                    <button class="lang-btn" data-lang="tr">TR</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <a href="index.html" class="nav-item" data-i18n="nav_home">🏠 <span>Ana Sayfa</span></a>
                <a href="discover.html" class="nav-item" data-i18n="nav_discover">🌍 <span>Keşfet</span></a>
                <a href="dashboard.html" class="nav-item" data-i18n="nav_library">📚 <span>Kütüphanem</span></a>
                <div class="user-profile-nav">
                    <button class="profile-trigger" id="profile-trigger">👤</button>
                    <div class="nav-dropdown" id="profile-dropdown">
                        <div class="dropdown-user-info" id="user-info-name" data-i18n="nav_guest">Misafir Yazar</div>
                        <a href="profile.html" class="dropdown-link" data-i18n="nav_profile">👤 Profilim</a>
                        <a href="#" class="dropdown-link logout" id="logout-btn" data-i18n="nav_logout">🚪 Çıkış Yap</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <button id="menu-toggle" class="mobile-only-btn">☰</button>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 data-i18n="chapters">Bölümler</h2>
                <button id="add-chapter-btn">+</button>
            </div>
            <ul id="chapters-list"></ul>

            <div class="stats-panel">
                <div class="stat-row">
                    <span class="stat-label" data-i18n="word_count">Kelime</span>
                    <span id="stat-words" class="stat-value">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label" data-i18n="char_count">Karakter</span>
                    <span id="stat-chars" class="stat-value">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label" data-i18n="page_count">Sayfa</span>
                    <span id="stat-pages" class="stat-value">0</span>
                </div>
            </div>

            <div style="padding: 20px 30px;">
                <button id="sync-folder-btn"
                    style="width: 100%; padding: 12px; border-radius: 8px; background: #d4af37; color: #000; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Poppins', sans-serif;" data-i18n="btn_sync_pc">
                    <span style="font-size: 1.2em;">📁</span> Bilgisayara Eşitle
                </button>
                <div id="sync-status"
                    style="font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 8px; text-align: center;" data-i18n="sync_not_selected">Klasör
                    Seçilmedi</div>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Window -->
        <main class="main-content">
            <div class="top-bar">
                <button id="prev-btn" class="nav-btn" data-i18n="btn_prev">Önceki</button>
                <div id="page-label">Sayfa 1 - 2</div>
                <button id="next-btn" class="nav-btn" data-i18n="btn_next">Sonraki</button>
            </div>

            <div class="book-container">
                <div class="book" id="book-el">
                    <div class="spine-border"></div>

                    <!-- Left Page -->
                    <div class="page page-left">
                        <div id="left-text" class="writing-area" contenteditable="true"></div>
                        <div class="page-footer" id="left-num">1</div>
                    </div>

                    <!-- Right Page -->
                    <div class="page page-right">
                        <div id="right-text" class="writing-area" contenteditable="true"></div>
                        <div class="page-footer" id="right-num">2</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden Ghost Page for Calculation -->
    <div id="ghost-page"
        style="position: absolute; left: -9999px; width: 450px; padding: 0; font-size: 14px; line-height: 1.6; font-family: 'Poppins', sans-serif; text-align: left; hyphens: auto; -webkit-hyphens: auto; visibility: hidden; white-space: pre-wrap; overflow-wrap: break-word;">
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>

</html>
