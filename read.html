<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okuma Modu | Sonsuz Kitap</title>
    <link rel="stylesheet" href="landing.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --read-bg: #0a0908;
            --paper-bg: #fdfaf3;
            --paper-text: #2c241e;
            --gold: #d4af37;
        }

        body {
            background: var(--read-bg);
            color: #fff;
            overflow-x: hidden;
        }

        .read-container {
            display: grid;
            grid-template-columns: 400px 1fr;
            min-height: 100vh;
        }

        /* Left Side: Book Info & Navigation */
        .read-sidebar {
            padding: 60px 40px;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(212, 175, 55, 0.1);
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
        }

        .read-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .read-back:hover { transform: translateX(-5px); }

        .read-book-cover {
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .read-book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .read-book-meta h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .read-book-meta p {
            color: var(--gold);
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
        }

        .chapter-nav {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .chapter-nav-item {
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        .chapter-nav-item:hover, .chapter-nav-item.active {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Right Side: Content */
        .read-content-area {
            padding: 80px 100px;
            display: flex;
            justify-content: center;
            background: linear-gradient(to right, #0a0908, #111);
        }

        .paper-view {
            width: 100%;
            max-width: 800px;
            background: var(--paper-bg);
            color: var(--paper-text);
            padding: 80px 100px;
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            position: relative;
            min-height: 120vh;
        }

        /* Paper Texture Effect */
        .paper-view::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/old-paper.png');
            opacity: 0.1;
            pointer-events: none;
        }

        .chapter-title-display {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            text-align: center;
            margin-bottom: 60px;
            font-style: italic;
            border-bottom: 1px solid rgba(44, 36, 30, 0.1);
            padding-bottom: 30px;
        }

        .chapter-text-content {
            font-family: 'EB Garamond', serif;
            font-size: 22px;
            line-height: 1.8;
            text-align: justify;
            white-space: pre-wrap;
        }

        .chapter-text-content p {
            margin-bottom: 25px;
            text-indent: 40px;
        }

        /* Scroll Progress */
        .scroll-progress {
            position: fixed;
            top: 0; left: 0;
            height: 4px;
            background: var(--gold);
            z-index: 100;
            width: 0%;
            transition: 0.1s;
        }

        /* Loading */
        .read-loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--read-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: 0.5s;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 1024px) {
            .read-container { grid-template-columns: 1fr; }
            .read-sidebar { height: auto; position: relative; padding: 40px; border-right: none; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
            .read-content-area { padding: 40px 20px; }
            .paper-view { padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <div class="scroll-progress" id="progress-bar"></div>
    <div class="grain-overlay"></div>

    <div id="loader" class="read-loader">
        <div class="loader-spinner"></div>
        <p style="margin-top: 20px; color: var(--gold);">Kitap Raftan İniyor...</p>
    </div>

    <div class="read-container">
        <!-- Sidebar -->
        <aside class="read-sidebar">
            <a href="index.html" class="read-back">← Kütüphaneye Dön</a>
            
            <div class="read-book-cover">
                <img id="book-cover" src="" alt="Kitap Kapağı">
            </div>

            <div class="read-book-meta">
                <h1 id="book-title">Yükleniyor...</h1>
                <p id="book-author">✍ Yazar Adı</p>
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <span id="book-category" style="background: rgba(212,175,55,0.1); color: var(--gold); padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 600;">Roman</span>
                    <span style="background: rgba(255,255,255,0.05); color: #fff; padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 600;">👁 <span id="book-views">0</span></span>
                </div>
            </div>

            <div class="chapter-nav" id="chapter-nav">
                <!-- Chapters will be loaded here -->
            </div>
        </aside>

        <!-- Content Area -->
        <main class="read-content-area">
            <article class="paper-view">
                <h2 class="chapter-title-display" id="display-chapter-title">Bölüm Başlığı</h2>
                <div class="chapter-text-content" id="display-chapter-content">
                    Burası yakında kelimelerle dolacak...
                </div>
            </article>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="read.js"></script>
</body>
</html>
