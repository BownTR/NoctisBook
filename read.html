<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okuma Modu | Noctis Kitap Dünyası</title>
    <link rel="stylesheet" href="landing.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="translations.js"></script>
    <style>
        :root {
            --read-bg: #0a0908;
            --paper-bg: #fdfaf3;
            --paper-text: #2c241e;
            --gold: #d4af37;
        }

        body {
            background: var(--read-bg);
            color: #fff;
            overflow-x: hidden;
        }

        .read-container {
            display: grid;
            grid-template-columns: 400px 1fr;
            min-height: 100vh;
        }

        /* Left Side: Book Info & Navigation */
        .read-sidebar {
            padding: 60px 40px;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(212, 175, 55, 0.1);
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
        }

        .read-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .read-back:hover { transform: translateX(-5px); }

        .read-book-cover {
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .read-book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .read-book-meta h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .read-book-meta p {
            color: var(--gold);
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
        }

        .chapter-nav {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .chapter-nav-item {
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        .chapter-nav-item:hover, .chapter-nav-item.active {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Right Side: Content */
        .read-content-area {
            padding: 60px 40px; /* Reduced side padding for container */
            display: flex;
            justify-content: center;
            background: linear-gradient(to right, #0a0908, #111);
        }

        .paper-view {
            width: 100%;
            max-width: 700px; /* WAS 800px */
            background: var(--paper-bg);
            color: var(--paper-text);
            padding: 70px 80px; /* WAS 80px 100px */
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5); /* Enhanced shadow */
            position: relative;
            min-height: 120vh;
        }

        /* Paper Texture Effect */
        .paper-view::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/old-paper.png');
            opacity: 0.1;
            pointer-events: none;
        }

        .chapter-title-display {
            font-family: 'Playfair Display', serif;
            font-size: 24px; /* WAS 32px */
            text-align: center;
            margin-bottom: 30px; /* WAS 40px */
            font-style: italic;
            border-bottom: 1px solid rgba(44, 36, 30, 0.1);
            padding-bottom: 20px; /* WAS 25px */
        }

        .chapter-text-content {
            font-family: 'EB Garamond', serif;
            font-size: 16px; /* WAS 18px */
            line-height: 1.5; /* WAS 1.7 */
            text-align: justify;
            white-space: pre-wrap;
            color: rgba(44, 36, 30, 0.95);
        }

        .chapter-text-content p {
            margin-bottom: 25px;
            text-indent: 40px;
        }

        /* Scroll Progress */
        .scroll-progress {
            position: fixed;
            top: 0; left: 0;
            height: 4px;
            background: var(--gold);
            z-index: 100;
            width: 0%;
            transition: 0.1s;
        }

        /* Loading */
        .read-loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--read-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: 0.5s;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Modern Sidebar Toggle */
        .sidebar-toggle {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--gold);
            color: #000;
            border-radius: 50%;
            border: none;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-toggle.active {
            transform: rotate(180deg);
            background: #fff;
        }

        @media (max-width: 1024px) {
            .read-container { 
                grid-template-columns: 1fr; 
                display: block; /* Switch to block for easier scrolling */
            }

            .sidebar-toggle { 
                display: flex; 
            }

            .read-sidebar { 
                position: fixed;
                top: 0;
                left: 0;
                width: 320px;
                height: 100vh;
                transform: translateX(-100%);
                transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                background: #0a0908;
                box-shadow: 20px 0 50px rgba(0,0,0,0.8);
                padding: 40px 30px;
                border: none;
            }

            .read-sidebar.open {
                transform: translateX(0);
            }

            .read-content-area { 
                padding: 30px 20px;
                background: var(--read-bg);
            }

            .paper-view { 
                padding: 30px 20px; 
                min-height: auto;
                box-shadow: none;
            }

            .chapter-title-display {
                font-size: 20px;
                margin-bottom: 20px;
            }

            .chapter-text-content {
                font-size: 14px;
                line-height: 1.5;
            }

            .read-sidebar-overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.7);
                z-index: 9;
                backdrop-filter: blur(5px);
            }

            .read-sidebar.open + .read-sidebar-overlay {
                display: block;
            }
        }
    </style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebar-toggle">📑</button>
    <div class="read-sidebar-overlay" id="sidebar-overlay"></div>
    
    <div class="scroll-progress" id="progress-bar"></div>
    <div class="grain-overlay"></div>

    <div id="loader" class="read-loader">
        <div class="loader-spinner"></div>
        <p style="margin-top: 20px; color: var(--gold);" data-i18n="book_from_shelf">Kitap Raftan İniyor...</p>
    </div>

    <div class="read-container">
        <!-- Sidebar -->
        <aside class="read-sidebar" id="read-sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <a href="dashboard.html" class="read-back" data-i18n="btn_back_library">← Kütüphaneye Dön</a>
                <div class="lang-switcher">
                    <button class="lang-btn" data-lang="tr">TR</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
            </div>
            
            <div class="read-book-cover">
                <img id="book-cover" src="" alt="Kitap Kapağı">
            </div>

            <div class="read-book-meta">
                <h1 id="book-title" data-i18n="loading">Yükleniyor...</h1>
                <p id="book-author" data-i18n="author_name">✍ Yazar Adı</p>
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <span id="book-category" style="background: rgba(212,175,55,0.1); color: var(--gold); padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 600;">Roman</span>
                    <span style="background: rgba(255,255,255,0.05); color: #fff; padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 600;">👁 <span id="book-views">0</span></span>
                </div>
            </div>

            <div class="chapter-nav" id="chapter-nav">
                <!-- Chapters will be loaded here -->
            </div>
        </aside>

        <!-- Content Area -->
        <main class="read-content-area">
            <article class="paper-view">
                <h2 class="chapter-title-display" id="display-chapter-title">Bölüm Başlığı</h2>
                <div class="chapter-text-content" id="display-chapter-content" data-i18n="writing_soon">
                    Burası yakında kelimelerle dolacak...
                </div>
            </article>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="read.js"></script>
</body>
</html>
